<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDS Knowledge Self-Audit Explorer</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-sidebar: #1e293b;
            --bg-card: #334155;
            --bg-card-hover: #475569;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            
            /* Threshold Colors */
            --fluency: #10b981;    /* Green (95%+) */
            --foundational: #f59e0b; /* Amber (85%-94%) */
            --risk: #ef4444;         /* Red (<85%) */
            
            --border-color: #475569;
            --accent: #38bdf8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        #error-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .error-box {
            background: #1e293b;
            border: 2px solid #ef4444;
            padding: 2.5rem;
            border-radius: 12px;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }
        .error-box h2 { color: #ef4444; margin-bottom: 1rem; }
        .error-box p { color: var(--text-muted); margin-bottom: 1.5rem; line-height: 1.5; }

        /* Left Rail Navigation */
        #sidebar {
            width: 320px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }
        .sidebar-header h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.025em; }
        .sidebar-header p { font-size: 0.85rem; color: var(--text-muted); margin-top: 0.25rem; }
        
        .class-menu {
            overflow-y: auto;
            flex-grow: 1;
            list-style: none;
        }
        .class-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.5rem;
            cursor: pointer;
            border-bottom: 1px solid rgba(71, 85, 105, 0.3);
            transition: background 0.2s;
        }
        .class-item:hover { background-color: rgba(255,255,255,0.05); }
        .class-item.active { background-color: #2563eb; }
        .class-info { display: flex; flex-direction: column; }
        .class-id { font-family: monospace; font-weight: bold; font-size: 1.1rem; }
        .class-title { font-size: 0.9rem; color: var(--text-main); margin-top: 0.1rem; }
        .class-item.active .class-title { color: #ffffff; }

        .badge {
            font-size: 0.75rem;
            font-weight: 700;
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            color: #000;
        }

        /* Main Panel Explorer */
        #main-panel {
            flex-grow: 1;
            padding: 2.5rem;
            overflow-y: auto;
            height: 100%;
        }
        .panel-header {
            margin-bottom: 2.5rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1.5rem;
        }
        .panel-header h2 { font-size: 2rem; margin-bottom: 0.5rem; display: flex; gap: 1rem; align-items: center;}
        .panel-header .nature-text { color: var(--text-muted); font-size: 1.1rem; line-height: 1.6; max-width: 800px; }
        
        .macro-blind-container {
            margin-top: 1rem;
            background: rgba(239, 68, 68, 0.1);
            border-left: 4px solid var(--risk);
            padding: 1rem;
            border-radius: 0 8px 8px 0;
        }
        .macro-blind-title { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; color: #fca5a5; font-weight: bold; margin-bottom: 0.25rem;}
        .macro-blind-list { list-style-position: inside; color: #f8fafc; font-size: 0.95rem; }

        .division-grid {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }
        .division-card {
            background-color: var(--bg-card);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            transition: transform 0.15s, border-color 0.15s;
        }
        .division-trigger {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem;
            cursor: pointer;
            user-select: none;
        }
        .division-trigger:hover { background-color: var(--bg-card-hover); }
        .div-title-block { display: flex; align-items: center; gap: 1rem; }
        .div-id { font-family: monospace; font-size: 1.2rem; font-weight: bold; color: var(--text-muted); }
        .div-name { font-size: 1.1rem; font-weight: 600; }
        
        .section-drawer {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            background-color: rgba(15, 23, 42, 0.4);
            border-top: 0 solid var(--border-color);
        }
        .division-card.expanded .section-drawer {
            max-height: 2500px;
            border-top: 1px solid var(--border-color);
        }

        .section-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 0.95rem;
        }
        .section-table th, .section-table td {
            padding: 0.85rem 1.25rem;
            border-bottom: 1px solid rgba(71, 85, 105, 0.2);
        }
        .section-table th {
            color: var(--text-muted);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: rgba(0,0,0,0.1);
        }
        .sec-title { font-weight: 500; width: 30%; }
        .sec-blind { color: #fda4af; font-style: italic; }
        
        /* Interactive Bridge Links */
        .sec-placeholder-action { 
            color: var(--accent); 
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            transition: color 0.15s;
        }
        .sec-placeholder-action:hover {
            color: #0284c7;
            text-decoration: underline;
        }

        .indicator-fluency { background-color: var(--fluency); color: #0f172a; }
        .indicator-foundational { background-color: var(--foundational); color: #0f172a; }
        .indicator-risk { background-color: var(--risk); color: #ffffff; }

        .chevron {
            transition: transform 0.2s;
            fill: var(--text-muted);
        }
        .division-card.expanded .chevron { transform: rotate(180deg); }
    </style>
</head>
<body>

    <div id="error-overlay">
        <div class="error-box">
            <h2>Data Manifest Initializing...</h2>
            <p>Constructing global map coordinates.</p>
        </div>
    </div>

    <nav id="sidebar">
        <div class="sidebar-header">
            <h1>DDS Archive Matrix</h1>
            <p>Knowledge Base Self-Audit Systems</p>
        </div>
        <ul class="class-menu" id="class-list"></ul>
    </nav>

    <main id="main-panel">
        <div class="panel-header" id="panel-header-content"></div>
        <div class="division-grid" id="division-container"></div>
    </main>

    <script>
    let globalData = null;

    // Real-World Canonical Subject Reference Dictionary
    const canonicalSubjectMap = {
        "004.1": "General Works on Computing & Manuals",
        "004.2": "Systems Architecture & Hardware Micro-Design",
        "004.35": "Parallel Processing & Neuromorphic Hardware Matrix Arrays",
        "121": "Epistemology & Theories of Knowledge Verification",
        "121.5": "Cognitive Sovereignty, Certainty, and Objective Logic",
        "241": "Human Action, Christian Ethics & Moral Theology Values",
        "242": "Devotional Literature, Direct Texts & Meditations",
        "248": "Christian Experience, Daily Practices & Devotional Theology Discipline",
        "330.1": "Systems of Political Economy & Capital Resource Allocation Models",
        "332.4": "Money Standardizations, Commodity Value Systems & Economic Media",
        "338.9": "Economic Development, Technological Infusion & Growth Factors",
        "521": "Celestial Mechanics & Gravitational Trajectory Coordinates",
        "531": "Classical Mechanics & Multi-Body Particle Kinematics",
        "532": "Fluid Mechanics & Non-Linear Flow Dynamics",
        "741.6": "Graphic Design, Visual Structural Layouts & Composition",
        "741.62": "Vector Layouts, Coordinate Translations & Spatial UI Elements",
        "744": "Technical Industrial Drawing & Precision Engineering Illustration"
    };

    function getThresholdClass(score) {
        if (!score) return 'indicator-risk';
        if (score >= 95) return 'indicator-fluency';
        if (score >= 85) return 'indicator-foundational';
        return 'indicator-risk';
    }

    // Unification Prompt Builder Engine
    function launchPromptModal(secId, runtimeTitle) {
        // Interrogate canonical index lookup first to ensure depth metrics are high
        const trueSubjectTitle = canonicalSubjectMap[secId] || runtimeTitle || "Target Specific Subcategory Domain Cluster";

        const customPrompt = `Act as a digital archivist conducting an on-demand granular audit of your data boundaries.

I am expanding my Dewey Decimal System Self-Audit repository. Please evaluate your depth of knowledge for this specific section:
- **Section ID:** ${secId}
- **Section Title:** ${trueSubjectTitle}

Provide a syntactically pristine JSON block matching this exact structure (do not wrap it in conversational text, just output the raw JSON code block):

"${secId}": {
  "id": "${secId}",
  "title": "${trueSubjectTitle}",
  "confidence": [Insert Estimated Confidence Score 0-100% based on your primary source data density],
  "blind_spot": "[Insert a hyper-specific, technical, or historical blind spot where your tracking accuracy wavers within this localized domain]"
}`;

        const modal = document.createElement('div');
        modal.style.position = 'fixed';
        modal.style.top = '0'; modal.style.left = '0'; modal.style.width = '100%'; modal.style.height = '100%';
        modal.style.background = 'rgba(15, 23, 42, 0.85)';
        modal.style.display = 'flex'; modal.style.alignItems = 'center'; modal.style.justifyContent = 'center';
        modal.style.zIndex = '2000'; modal.style.backdropFilter = 'blur(4px)';

        modal.innerHTML = `
            <div style="background: #1e293b; border: 1px solid #475569; padding: 2rem; border-radius: 12px; max-width: 700px; width: 90%; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);">
                <h3 style="margin-bottom: 0.5rem; color: #f8fafc;">On-Demand Audit Prompt Compiled</h3>
                <p style="color: #94a3b8; font-size: 0.85rem; margin-bottom: 1.25rem;">Copy this generated core validation configuration query into our chat stream to pull down the dynamic missing payload asset block.</p>
                <textarea readonly style="width: 100%; height: 260px; background: #0f172a; color: #38bdf8; border: 1px solid #334155; padding: 1rem; border-radius: 6px; font-family: monospace; font-size: 0.85rem; resize: none; margin-bottom: 1.5rem;">${customPrompt}</textarea>
                <div style="display: flex; justify-content: flex-end; gap: 1rem;">
                    <button id="copy-modal-btn" style="background: #2563eb; color: white; border: none; padding: 0.6rem 1.2rem; border-radius: 6px; font-weight: 600; cursor: pointer;">Copy Prompt Payload</button>
                    <button id="close-modal-btn" style="background: #475569; color: white; border: none; padding: 0.6rem 1.2rem; border-radius: 6px; font-weight: 600; cursor: pointer;">Dismiss Window</button>
                </div>
            </div>
        `;

        document.body.appendChild(modal);

        modal.querySelector('#copy-modal-btn').addEventListener('click', () => {
            modal.querySelector('textarea').select();
            document.execCommand('copy');
            modal.querySelector('#copy-modal-btn').innerText = "Copied smoothly!";
            setTimeout(() => { modal.querySelector('#copy-modal-btn').innerText = "Copy Prompt Payload"; }, 2000);
        });

        modal.querySelector('#close-modal-btn').addEventListener('click', () => {
            modal.remove();
        });
    }

    async function runAuditSystem() {
        try {
            const response = await fetch('dds_manifest.json');
            if (!response.ok) throw new Error();
            globalData = await response.json();
            console.log("Master Manifest layer synced seamlessly.");
        } catch (err) {
            console.error("Critical: Master manifest configuration file could not be parsed.");
        } finally {
            const overlay = document.getElementById('error-overlay');
            if (overlay) overlay.style.display = 'none';
            if (globalData && globalData.classes) {
                initializeUI();
            }
        }
    }

    function initializeUI() {
        const classList = document.getElementById('class-list');
        const targetClasses = globalData.classes;
        classList.innerHTML = "";
        
        let structuralFirstKey = null;

        Object.keys(targetClasses).sort().forEach((classId, index) => {
            if(index === 0) structuralFirstKey = classId;
            const dataObj = targetClasses[classId];
            const li = document.createElement('li');
            li.className = `class-item ${index === 0 ? 'active' : ''}`;
            li.setAttribute('data-id', classId);
            
            li.innerHTML = `
                <div class="class-info">
                    <span class="class-id">${classId}</span>
                    <span class="class-title">${dataObj.title}</span>
                </div>
                <span class="badge ${getThresholdClass(dataObj.base_confidence)}">${dataObj.base_confidence || 0}%</span>
            `;
            
            li.addEventListener('click', () => switchMainClassContext(classId));
            classList.appendChild(li);
        });

        if(structuralFirstKey) {
            switchMainClassContext(structuralFirstKey);
        }
    }

    function switchMainClassContext(classId) {
        document.querySelectorAll('.class-item').forEach(el => el.classList.remove('active'));
        const activeItem = document.querySelector(`.class-item[data-id="${classId}"]`);
        if (activeItem) activeItem.classList.add('active');

        const classData = globalData.classes[classId];
        const headerContent = document.getElementById('panel-header-content');
        
        let spotsListItems = "";
        if (classData.macro_blind_spots && classData.macro_blind_spots.length > 0) {
            classData.macro_blind_spots.forEach(spot => {
                spotsListItems += `<li class="macro-blind-item">${spot}</li>`;
            });
        } else {
            spotsListItems = `<li class="sec-placeholder" style="color:var(--text-muted); opacity:0.5; font-style:italic; font-size:0.9rem;">No notable system tracking systemic discrepancies documented.</li>`;
        }

        headerContent.innerHTML = `
            <h2>${classId} – ${classData.title} <span class="badge ${getThresholdClass(classData.base_confidence)}">${classData.base_confidence || 0}% Layer Base</span></h2>
            <p class="nature-text">${classData.data_nature}</p>
            <div class="macro-blind-container">
                <div class="macro-blind-title">Structural Domain Macro Blind Spots</div>
                <ul class="macro-blind-list">${spotsListItems}</ul>
            </div>
        `;

        const divisionContainer = document.getElementById('division-container');
        divisionContainer.innerHTML = "";

        if(!classData.divisions || Object.keys(classData.divisions).length === 0) {
            divisionContainer.innerHTML = `<div style="padding:2rem; font-style:italic; color:var(--text-muted); opacity:0.5;">No deep structural division records unpopulated for this classification block.</div>`;
            return;
        }

        Object.keys(classData.divisions).sort().forEach(divId => {
            const divData = classData.divisions[divId];
            const card = document.createElement('div');
            card.className = 'division-card';
            
            let sectionRows = "";
            if(divData.sections && Object.keys(divData.sections).length > 0) {
                Object.keys(divData.sections).sort().forEach(secId => {
                    const secData = divData.sections[secId];
                    
                    let blindSpotCellContent = "";
let scoreBadgeContent = "";

// 1. THE IF BLOCK: Handles completed, audited entries
if (secData.blind_spot && secData.blind_spot.trim() !== "") {
    let profileHtml = `<div class="sec-blind"><strong>System Boundary Limit:</strong> ${secData.blind_spot}</div>`;
    
    // Check if the newly expanded capability profile lists exist in your JSON
    if (secData.capability_profile) {
        const prof = secData.capability_profile.known_proficiencies || [];
        const weak = secData.capability_profile.suspected_weaknesses || [];
        
        profileHtml += `
            <div class="capability-matrix" style="margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px dashed rgba(255,255,255,0.1); font-size: 0.85rem;">
                <div style="color: #4ade80; margin-bottom: 0.25rem;"><strong>✓ Known Proficiencies:</strong></div>
                <ul style="list-style-type: square; margin-left: 1.25rem; margin-bottom: 0.5rem; color: var(--text-main);">
                    ${prof.map(p => `<li>${p}</li>`).join('')}
                </ul>
                <div style="color: #fca5a5; margin-bottom: 0.25rem;"><strong>⚠ Suspected Weaknesses:</strong></div>
                <ul style="list-style-type: square; margin-left: 1.25rem; color: var(--text-muted);">
                    ${weak.map(w => `<li>${w}</li>`).join('')}
                </ul>
            </div>
        `;
    }
    blindSpotCellContent = profileHtml;
    scoreBadgeContent = `<span class="badge ${getThresholdClass(secData.confidence)}">${secData.confidence}%</span>`;

// 2. THE ELSE BLOCK: Keep this completely safe to preserve your interactive prompt links!
} else {
    const assignedTrueName = canonicalSubjectMap[secId] || secData.title;
    blindSpotCellContent = `<a class="sec-placeholder-action" data-id="${secId}" data-title="${assignedTrueName}">⚡ Gather Audit Data Prompt Matrix</a>`;
    scoreBadgeContent = `<span class="badge indicator-risk" style="opacity: 0.3;">0%</span>`;
}

            card.innerHTML = `
                <div class="division-trigger">
                    <div class="div-title-block">
                        <span class="div-id">${divId}</span>
                        <span class="div-name">${divData.title}</span>
                    </div>
                    <div style="display:flex; align-items:center; gap:1.5rem;">
                        <span class="badge ${getThresholdClass(divData.division_confidence)}">${divData.division_confidence || 0}%</span>
                        <svg class="chevron" width="24" height="24" viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
                    </div>
                </div>
                <div class="section-drawer">
                    <table class="section-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Section System Segment Name</th>
                                <th>Confidence</th>
                                <th>Micro-Scale Blind Spot Profile Target</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${sectionRows}
                        </tbody>
                    </table>
                </div>
            `;

            // Setup listeners for the dynamic modal link triggers inside the cells
            card.querySelectorAll('.sec-placeholder-action').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.stopPropagation();
                    e.preventDefault();
                    launchPromptModal(link.getAttribute('data-id'), link.getAttribute('data-title'));
                });
            });

            card.querySelector('.division-trigger').addEventListener('click', () => {
                const isExpanded = card.classList.contains('expanded');
                document.querySelectorAll('.division-card').forEach(c => c.classList.remove('expanded'));
                if (!isExpanded) {
                    card.classList.add('expanded');
                }
            });

            divisionContainer.appendChild(card);
        });
    }

    window.addEventListener('DOMContentLoaded', runAuditSystem);
</script>
</body>
</html>
