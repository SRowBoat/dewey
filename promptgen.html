<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDS Bulk Prompt Matrix Generator</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #0f172a;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #0284c7;
            --border: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            padding: 3rem 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2.5rem;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        h1 {
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        .control-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        select {
            width: 100%;
            padding: 0.75rem 1rem;
            background-color: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-main);
            font-size: 1rem;
            cursor: pointer;
            outline: none;
        }

        select:focus {
            border-color: var(--accent);
        }

        button {
            width: 100%;
            padding: 0.85rem;
            background-color: var(--accent);
            color: #0f172a;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 2rem;
        }

        button:hover {
            background-color: var(--accent-hover);
            color: white;
        }

        .output-group {
            display: none;
        }

        .output-group.visible {
            display: block;
        }

        textarea {
            width: 100%;
            height: 380px;
            background-color: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem;
            color: var(--accent);
            font-family: monospace;
            font-size: 0.85rem;
            resize: none;
            outline: none;
            margin-bottom: 1rem;
        }

        .status-banner {
            padding: 0.75rem 1rem;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            font-weight: 500;
            background-color: rgba(51, 65, 85, 0.5);
            border: 1px solid var(--border);
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>DDS Bulk Prompt Matrix Generator</h1>
        <p class="subtitle">Harvest empty structural cells dynamically. The generator maps each numeric coordinate to its true canonical DDS subject domain before compiling your prompt.</p>

        <div id="sync-status" class="status-banner">Initializing pipeline connectivity...</div>

        <div class="control-group">
            <label for="class-select">Target Class Cluster</label>
            <select id="class-select">
                <option value="000">000 - Computer Science, Information & General Works</option>
                <option value="100">100 - Philosophy & Psychology</option>
                <option value="200">200 - Religion</option>
                <option value="300">300 - Social Sciences</option>
                <option value="400">400 - Language</option>
                <option value="500">500 - Pure Science</option>
                <option value="600">600 - Technology / Applied Science</option>
                <option value="700">700 - Arts & Recreation</option>
                <option value="800">800 - Literature</option>
                <option value="900">900 - History & Geography</option>
            </select>
        </div>

        <button id="generate-btn">Compile Bulk Ingestion Prompt</button>

        <div class="output-group" id="output-wrapper">
            <label for="prompt-output" id="action-label">Generated Macro-Prompt Payload</label>
            <textarea id="prompt-output" readonly></textarea>
        </div>
    </div>

    <script>
        let liveManifestData = null;

    const classSelect = document.getElementById('class-select');
    const generateBtn = document.getElementById('generate-btn');
    const outputWrapper = document.getElementById('output-wrapper');
    const promptOutput = document.getElementById('prompt-output');
    const syncStatus = document.getElementById('sync-status');
    const actionLabel = document.getElementById('action-label');

    // Core Real-World Canonical Subject Registry Map
    const canonicalSubjectMap = {
        "004.1": "General Works on Computing & Manuals",
        "004.2": "Systems Architecture & Hardware Micro-Design",
        "004.35": "Parallel Processing & Neuromorphic Hardware Matrix Arrays",
        "121": "Epistemology & Theories of Knowledge Verification",
        "121.5": "Cognitive Sovereignty, Certainty, and Objective Logic",
        "241": "Human Action, Christian Ethics & Moral Theology Values",
        "242": "Devotional Literature, Direct Texts & Meditations",
        "248": "Christian Experience, Daily Practices & Devotional Theology Discipline",
        "330.1": "Systems of Political Economy & Capital Resource Allocation Models",
        "332.4": "Money Standardizations, Commodity Value Systems & Economic Media",
        "338.9": "Economic Development, Technological Infusion & Growth Factors",
        "521": "Celestial Mechanics & Gravitational Trajectory Coordinates",
        "531": "Classical Mechanics & Multi-Body Particle Kinematics",
        "532": "Fluid Mechanics & Non-Linear Flow Dynamics",
        "741.6": "Graphic Design, Visual Structural Layouts & Composition",
        "741.62": "Vector Layouts, Coordinate Translations & Spatial UI Elements",
        "744": "Technical Industrial Drawing & Precision Engineering Illustration"
    };

    // Strict Data Ingestion Loop
    async function loadManifestAsset() {
        try {
            const response = await fetch('dds_manifest.json');
            if (!response.ok) throw new Error();
            liveManifestData = await response.json();
            
            // Connection Active State
            syncStatus.innerText = "Pipeline Synced: Successfully linked to dds_manifest.json asset layers.";
            syncStatus.style.borderColor = "#10b981";
            syncStatus.style.color = "#34d399";
            syncStatus.style.backgroundColor = "rgba(16, 185, 129, 0.1)";
            generateBtn.disabled = false;
            generateBtn.style.opacity = "1";
            generateBtn.innerText = "Compile Bulk Ingestion Prompt";
        } catch (err) {
            // Connection Blocked/Offline State
            syncStatus.innerText = "CRITICAL LIMITATION: This generator tool requires an active server connection to dds_manifest.json to evaluate unmapped rows.";
            syncStatus.style.borderColor = "#ef4444";
            syncStatus.style.color = "#fca5a5";
            syncStatus.style.backgroundColor = "rgba(239, 68, 68, 0.15)";
            
            // Lock UI Controls
            generateBtn.disabled = true;
            generateBtn.style.opacity = "0.4";
            generateBtn.style.cursor = "not-allowed";
            generateBtn.innerText = "Execution Locked: dds_manifest.json Asset File Missing";
        }
    }

    generateBtn.addEventListener('click', () => {
        if (!liveManifestData) return;

        const selectedClassPrefix = classSelect.value;
        const activeClassData = liveManifestData.classes[selectedClassPrefix];

        if (!activeClassData || !activeClassData.divisions) {
            alert(`The target cluster [${selectedClassPrefix}] is completely missing inside your current dds_manifest.json file.`);
            return;
        }

        let sectionTargetsText = "";
        let jsonStructureTemplate = "";
        let missingCount = 0;

        Object.keys(activeClassData.divisions).sort().forEach(divId => {
            const division = activeClassData.divisions[divId];
            if (division.sections) {
                Object.keys(division.sections).sort().forEach(secId => {
                    const section = division.sections[secId];
                    
                    if (!section.blind_spot || section.blind_spot.trim() === "") {
                        missingCount++;
                        const workingTrueTitle = canonicalSubjectMap[secId] || section.title || "Target Specific Subcategory Domain Cluster";
                        
                        sectionTargetsText += `- **Section ID:** ${secId} | **Section Title:** ${workingTrueTitle}\n`;
                        jsonStructureTemplate += `  "${secId}": {\n    "id": "${secId}",\n    "title": "${workingTrueTitle}",\n    "confidence": [Insert Estimated Confidence Score 0-100% based on your primary source data density],\n    "blind_spot": "[Insert a hyper-specific, technical, or historical blind spot where your tracking accuracy wavers within this localized domain]"\n  },\n`;
                    }
                });
            }
        });

        if (missingCount === 0) {
            promptOutput.value = `Verification Complete: All structural section layers inside Class cluster ${selectedClassPrefix} are already 100% audited and populated!`;
            actionLabel.innerText = "System Audit Complete";
            actionLabel.style.color = "#10b981";
            outputWrapper.classList.add('visible');
            return;
        }

        jsonStructureTemplate = jsonStructureTemplate.trim().replace(/,$/, '');

        const bulkMacroPrompt = `Act as a digital archivist conducting an on-demand granular audit of your data boundaries.

I am expanding my Dewey Decimal System Self-Audit repository. Please evaluate your depth of knowledge simultaneously across all of the following un-populated structural nodes:
${sectionTargetsText}
Provide a syntactically pristine JSON block matching this exact structure (do not wrap it in conversational text, markdown introductory commentary, or explanations; just output the raw JSON code block data tree):

{
${jsonStructureTemplate}
}`;

        promptOutput.value = bulkMacroPrompt;
        actionLabel.innerText = `Generated Bulk Macro-Prompt Payload (${missingCount} Nodes Targeted)`;
        actionLabel.style.color = "var(--accent)";
        outputWrapper.classList.add('visible');
    });

    promptOutput.addEventListener('click', () => {
        promptOutput.select();
        document.execCommand('copy');
        const originalLabel = actionLabel.innerText;
        actionLabel.innerText = "Payload copied to clipboard successfully!";
        actionLabel.style.color = "#10b981";
        setTimeout(() => { 
            actionLabel.innerText = originalLabel; 
            actionLabel.style.color = "var(--accent)";
        }, 2500);
    });

    window.addEventListener('DOMContentLoaded', loadManifestAsset);

        generateBtn.addEventListener('click', () => {
            const selectedClassPrefix = classSelect.value;
            
            if (!liveManifestData || !liveManifestData.classes) {
                alert("Cannot generate prompts: Live manifest asset data has not been parsed or is unpopulated.");
                return;
            }

            const activeClassData = liveManifestData.classes[selectedClassPrefix];

            if (!activeClassData || !activeClassData.divisions) {
                alert(`The target cluster [${selectedClassPrefix}] is completely missing inside your current dds_manifest.json file.`);
                return;
            }

            let sectionTargetsText = "";
            let jsonStructureTemplate = "";
            let missingCount = 0;

            Object.keys(activeClassData.divisions).sort().forEach(divId => {
                const division = activeClassData.divisions[divId];
                if (division.sections) {
                    Object.keys(division.sections).sort().forEach(secId => {
                        const section = division.sections[secId];
                        
                        // HARVEST CONDITION: Catch empty blind spots
                        if (!section.blind_spot || section.blind_spot.trim() === "") {
                            missingCount++;
                            
                            // DYNAMIC RESOLUTION: Pull canonical title if registered, else use default structural fallback
                            const workingTrueTitle = canonicalSubjectMap[secId] || section.title || "Target Specific Subcategory Domain Cluster";
                            
                            sectionTargetsText += `- **Section ID:** ${secId} | **Section Title:** ${workingTrueTitle}\n`;
                            jsonStructureTemplate += `  "${secId}": {\n    "id": "${secId}",\n    "title": "${workingTrueTitle}",\n    "confidence": [Insert Estimated Confidence Score 0-100% based on your primary source data density],\n    "blind_spot": "[Insert a hyper-specific, technical, or historical blind spot where your tracking accuracy wavers within this localized domain]"\n  },\n`;
                        }
                    });
                }
            });

            if (missingCount === 0) {
                promptOutput.value = `Verification Complete: All structural section layers inside Class cluster ${selectedClassPrefix} are already 100% audited and populated!`;
                actionLabel.innerText = "System Audit Complete";
                actionLabel.style.color = "#10b981";
                outputWrapper.classList.add('visible');
                return;
            }

            jsonStructureTemplate = jsonStructureTemplate.trim().replace(/,$/, '');

            const bulkMacroPrompt = `Act as a digital archivist conducting an on-demand granular audit of your data boundaries.

I am expanding my Dewey Decimal System Self-Audit repository. Please evaluate your depth of knowledge simultaneously across all of the following un-populated structural nodes:
${sectionTargetsText}
Provide a syntactically pristine JSON block matching this exact structure (do not wrap it in conversational text, markdown introductory commentary, or explanations; just output the raw JSON code block data tree):

{
${jsonStructureTemplate}
}`;

            promptOutput.value = bulkMacroPrompt;
            actionLabel.innerText = `Generated Bulk Macro-Prompt Payload (${missingCount} Nodes Targeted)`;
            actionLabel.style.color = "var(--accent)";
            outputWrapper.classList.add('visible');
        });

        promptOutput.addEventListener('click', () => {
            promptOutput.select();
            document.execCommand('copy');
            const originalLabel = actionLabel.innerText;
            actionLabel.innerText = "Payload copied to clipboard successfully!";
            actionLabel.style.color = "#10b981";
            setTimeout(() => { 
                actionLabel.innerText = originalLabel; 
                actionLabel.style.color = "var(--accent)";
            }, 2500);
        });

        window.addEventListener('DOMContentLoaded', loadManifestAsset);
    </script>
</body>
</html>
