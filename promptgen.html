<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDS Bulk Prompt Matrix Generator</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #0f172a;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #0284c7;
            --border: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            padding: 3rem 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2.5rem;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        h1 {
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        .control-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        select {
            width: 100%;
            padding: 0.75rem 1rem;
            background-color: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-main);
            font-size: 1rem;
            cursor: pointer;
            outline: none;
        }

        select:focus {
            border-color: var(--accent);
        }

        button {
            width: 100%;
            padding: 0.85rem;
            background-color: var(--accent);
            color: #0f172a;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 2rem;
        }

        button:hover {
            background-color: var(--accent-hover);
            color: white;
        }

        .output-group {
            display: none;
        }

        .output-group.visible {
            display: block;
        }

        textarea {
            width: 100%;
            height: 340px;
            background-color: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem;
            color: var(--accent);
            font-family: monospace;
            font-size: 0.85rem;
            resize: none;
            outline: none;
            margin-bottom: 1rem;
        }

        .status-banner {
            padding: 0.75rem 1rem;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            font-weight: 500;
            background-color: rgba(51, 65, 85, 0.5);
            border: 1px solid var(--border);
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>DDS Bulk Prompt Matrix Generator</h1>
        <p class="subtitle">Harvest empty structural cells directly from your live JSON manifest. Select a master category block below to build a unified data extraction prompt.</p>

        <div id="sync-status" class="status-banner">Initializing pipeline connectivity...</div>

        <div class="control-group">
            <label for="class-select">Target Class Cluster</label>
            <select id="class-select">
                <option value="000">000 - Computer Science, Information & General Works</option>
                <option value="100">100 - Philosophy & Psychology</option>
                <option value="200">200 - Religion</option>
                <option value="300">300 - Social Sciences</option>
                <option value="400">400 - Language</option>
                <option value="500">500 - Pure Science</option>
                <option value="600">600 - Technology / Applied Science</option>
                <option value="700">700 - Arts & Recreation</option>
                <option value="800">800 - Literature</option>
                <option value="900">900 - History & Geography</option>
            </select>
        </div>

        <button id="generate-btn">Compile Bulk Ingestion Prompt</button>

        <div class="output-group" id="output-wrapper">
            <label for="prompt-output" id="action-label">Generated Macro-Prompt Payload</label>
            <textarea id="prompt-output" readonly></textarea>
        </div>
    </div>

    <script>
        let liveManifestData = null;

        const classSelect = document.getElementById('class-select');
        const generateBtn = document.getElementById('generate-btn');
        const outputWrapper = document.getElementById('output-wrapper');
        const promptOutput = document.getElementById('prompt-output');
        const syncStatus = document.getElementById('sync-status');
        const actionLabel = document.getElementById('action-label');

        // High-reliability live JSON data asset ingestion
        async function loadManifestAsset() {
            try {
                const response = await fetch('dds_manifest.json');
                if (!response.ok) throw new Error();
                liveManifestData = await response.json();
                
                syncStatus.innerText = "Pipeline Synced: Successfully linked to dds_manifest.json asset layers.";
                syncStatus.style.borderColor = "#10b981";
                syncStatus.style.color = "#34d399";
                syncStatus.style.backgroundColor = "rgba(16, 185, 129, 0.1)";
            } catch (err) {
                console.warn("Unable to fetch manifest. Operating in detached network sandbox state.");
                syncStatus.innerText = "Sandbox State: Running isolated from dds_manifest.json asset.";
                syncStatus.style.borderColor = "#f59e0b";
                syncStatus.style.color = "#fbbf24";
                syncStatus.style.backgroundColor = "rgba(245, 158, 11, 0.1)";
            }
        }

        generateBtn.addEventListener('click', () => {
            const selectedClassPrefix = classSelect.value;
            
            if (!liveManifestData || !liveManifestData.classes) {
                alert("Cannot generate prompts: Live manifest asset array data has not been parsed or is unpopulated.");
                return;
            }

            const activeClassData = liveManifestData.classes[selectedClassPrefix];

            if (!activeClassData || !activeClassData.divisions) {
                alert(`The target cluster [${selectedClassPrefix}] is completely missing or unpopulated inside your current dds_manifest.json file.`);
                return;
            }

            let sectionTargetsText = "";
            let jsonStructureTemplate = "";
            let missingCount = 0;

            // Deep-scan through the true active target division structure
            Object.keys(activeClassData.divisions).sort().forEach(divId => {
                const division = activeClassData.divisions[divId];
                if (division.sections) {
                    Object.keys(division.sections).sort().forEach(secId => {
                        const section = division.sections[secId];
                        
                        // HARVEST CONDITION: Identify only cells with unpopulated/blank blind spots
                        if (!section.blind_spot || section.blind_spot.trim() === "") {
                            missingCount++;
                            sectionTargetsText += `- **Section ID:** ${secId} | **Section Title:** ${section.title}\n`;
                            jsonStructureTemplate += `  "${secId}": {\n    "id": "${secId}",\n    "title": "${section.title}",\n    "confidence": [Estimated Depth Score 0-100%],\n    "blind_spot": "[Hyper-specific architectural limit or data tracking gap]"\n  },\n`;
                        }
                    });
                }
            });

            if (missingCount === 0) {
                promptOutput.value = `Verification Complete: All structural section layers inside Class cluster ${selectedClassPrefix} are already 100% audited and populated!`;
                actionLabel.innerText = "System Audit Complete";
                actionLabel.style.color = "#10b981";
                outputWrapper.classList.add('visible');
                return;
            }

            // Trim trailing structural loop characters
            jsonStructureTemplate = jsonStructureTemplate.trim().replace(/,$/, '');

            const bulkMacroPrompt = `Act as an elite digital archivist performing an on-demand, multi-node structural validation audit.

I am populating the baseline manifest layer of my Dewey Decimal System Explorer for the macro category cluster: **${selectedClassPrefix} - ${activeClassData.title}**.

Please run an objective depth-of-knowledge assessment simultaneously across all of the following un-populated structural nodes:
${sectionTargetsText}
Provide a syntactically pristine, single JSON object payload combining all responses. Your output must be strictly valid JSON text containing no conversational introductory prose, markdown commentary, or explanations. Return only the raw data tree block matching this exact structural interface definition:

{
${jsonStructureTemplate}
}`;

            promptOutput.value = bulkMacroPrompt;
            actionLabel.innerText = `Generated Bulk Macro-Prompt Payload (${missingCount} Nodes Target)`;
            actionLabel.style.color = "var(--accent)";
            outputWrapper.classList.add('visible');
        });

        // Click-to-copy handler convenience layer
        promptOutput.addEventListener('click', () => {
            promptOutput.select();
            document.execCommand('copy');
            const originalLabel = actionLabel.innerText;
            actionLabel.innerText = "Payload copied to clipboard successfully!";
            actionLabel.style.color = "#10b981";
            setTimeout(() => { 
                actionLabel.innerText = originalLabel; 
                actionLabel.style.color = "var(--accent)";
            }, 2500);
        });

        window.addEventListener('DOMContentLoaded', loadManifestAsset);
    </script>
</body>
</html>
